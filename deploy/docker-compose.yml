services:
  hermes-api:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    command: ["python", "-X", "utf8", "main.py", "--api", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8002:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/hermes/data/logs:/app/logs
      - /opt/hermes/data/sessions:/app/sessions
      - /opt/hermes/data/trajectories:/app/trajectories
      - /opt/hermes/data/skills:/app/skills
      - /opt/hermes/data/users:/app/users
      - /opt/hermes/data/models:/app/models
      - /opt/hermes/data/benchmark:/app/benchmark_results
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  hermes-bot:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    command: ["python", "-X", "utf8", "main.py", "--bot"]
    depends_on:
      hermes-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/hermes/data/logs:/app/logs
      - /opt/hermes/data/sessions:/app/sessions
      - /opt/hermes/data/trajectories:/app/trajectories
      - /opt/hermes/data/skills:/app/skills
      - /opt/hermes/data/users:/app/users
      - /opt/hermes/data/models:/app/models
